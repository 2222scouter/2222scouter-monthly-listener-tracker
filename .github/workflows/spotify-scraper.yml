name: 2222scouter Monthly Listener Tracker

on:
  schedule:
    - cron: '*/10 20 * * *'   # 3:00 PM – 3:50 PM EST every 10 min
    - cron: '0 21 * * *'      # Exactly 4:00 PM EST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas requests plotly
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python spotify_listeners_tracker.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify_listeners_history.csv dashboard.html
          git commit -m "Listener update $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
