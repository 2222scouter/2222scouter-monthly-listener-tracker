name: 2222scouter Monthly Listener Tracker

on:
  push:
    branches: [ main ]          # Keeps workflow visible & testable
  schedule:
    - cron: '*/10 20 * * *'     # 3:00–3:50 PM EST
    - cron: '0 21 * * *'        # 4:00 PM EST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgbm1 libgcc-s1 libglib2.0-0 libgtk-3-0 \
            libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 \
            libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 \
            libxss1 libxtst6 wget xdg-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas requests plotly

      - name: Install Playwright browsers
        run: |
          playwright install-deps
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python spotify_listeners_tracker.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify_listeners_history.csv dashboard.html || true
          git commit -m "Daily listener update $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push || echo "No push needed"
